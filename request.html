<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Post a Project — SkillBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#6366f1;
  --accent2:#22d3ee;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:var(--text);
}

header{
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #334155;
}

.logo{
  font-weight:700;
  font-size:22px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.container{
  padding:60px 8%;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:36px;
  margin-bottom:10px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:40px;
}

.form-card{
  background:var(--card);
  padding:35px;
  border-radius:15px;
  border:1px solid #334155;
}

label{
  display:block;
  margin:18px 0 6px;
  font-weight:600;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

textarea{min-height:120px;resize:vertical;}

.row{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.row > div{flex:1;min-width:200px;}

.btn{
  margin-top:30px;
  padding:14px;
  border:none;
  border-radius:30px;
  font-weight:600;
  width:100%;
  cursor:pointer;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
  transition:0.3s;
}
.btn:hover{transform:scale(1.03);}

.note{
  margin-top:15px;
  color:var(--muted);
  font-size:13px;
}

footer{
  margin-top:80px;
  padding:30px;
  text-align:center;
  color:var(--muted);
  border-top:1px solid #334155;
}
</style>
</head>

<body>

<header>
  <div class="logo">SkillBridge</div>
  <div>Hire Talent</div>
</header>

<div class="container">
  <h1>Post a Project Request</h1>
  <p class="subtitle">Describe your project clearly and get matched with top freelancers.</p>

  <div class="form-card">
    <form id="projectForm">

      <label>Project Title</label>
      <input type="text" placeholder="e.g., Build a landing page for my app" required>

      <label>Category</label>
      <select required>
        <option>Web Development</option>
        <option>Design</option>
        <option>Writing</option>
        <option>Marketing</option>
        <option>Video & Animation</option>
      </select>

      <label>Project Description</label>
      <textarea placeholder="Describe your goals, features, and expectations..." required></textarea>

      <div class="row">
        <div>
          <label>Budget (USD)</label>
          <input type="number" placeholder="500" required>
        </div>
        <div>
          <label>Deadline</label>
          <input type="date" required>
        </div>
      </div>

      <label>Required Skills (comma separated)</label>
      <input type="text" placeholder="React, SEO, UI Design">

      <button type="submit" class="btn">Submit Project</button>

      <p class="note">Next phase: this form connects to backend matching + email notifications.</p>

    </form>
  </div>
</div>

<footer>
  © 2026 SkillBridge — Premium Freelance Network
</footer>

<script>
document.getElementById("projectForm").addEventListener("submit", function(e){
  e.preventDefault();
  alert("Project submitted. Matching system comes in backend phase.");
});
</script>

</body>
  </html>
