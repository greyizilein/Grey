<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login / Sign Up — SkillBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --panel:#1e293b;
  --accent:#6366f1;
  --accent2:#22d3ee;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:950px;
  max-width:95%;
  display:flex;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* Left Branding Panel */
.left{
  flex:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.left h1{
  font-size:38px;
  margin-bottom:15px;
}

.left p{
  max-width:350px;
  line-height:1.5;
}

/* Right Form Panel */
.right{
  flex:1;
  background:var(--panel);
  padding:50px 45px;
}

.tabs{
  display:flex;
  margin-bottom:30px;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  font-weight:600;
}

.tab.active{
  border-color:var(--accent2);
}

form{
  display:flex;
  flex-direction:column;
}

label{
  font-size:14px;
  margin-bottom:6px;
}

input{
  padding:12px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  margin-bottom:18px;
}

button{
  padding:13px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  font-weight:600;
  cursor:pointer;
  margin-top:5px;
}

.note{
  margin-top:18px;
  font-size:13px;
  color:var(--muted);
  text-align:center;
}

.hidden{display:none;}

@media(max-width:800px){
  .container{flex-direction:column;}
  .left{padding:40px;}
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>Welcome to SkillBridge</h1>
    <p>Work with verified freelancers, manage projects efficiently, and scale faster with curated talent.</p>
  </div>

  <div class="right">

    <div class="tabs">
      <div class="tab active" onclick="showLogin()">Login</div>
      <div class="tab" onclick="showSignup()">Sign Up</div>
    </div>

    <!-- Login -->
    <form id="loginForm">
      <label>Email</label>
      <input type="email" required>

      <label>Password</label>
      <input type="password" required>

      <button type="submit">Login</button>
      <div class="note">Dashboard connection comes in backend phase.</div>
    </form>

    <!-- Signup -->
    <form id="signupForm" class="hidden">
      <label>Full Name</label>
      <input type="text" required>

      <label>Email</label>
      <input type="email" required>

      <label>Password</label>
      <input type="password" required>

      <label>I am a</label>
      <select style="padding:12px;border-radius:8px;background:#0f172a;color:white;border:1px solid #334155;margin-bottom:18px;">
        <option>Buyer</option>
        <option>Freelancer</option>
      </select>

      <button type="submit">Create Account</button>
      <div class="note">Account system activates once backend is connected.</div>
    </form>

  </div>

</div>

<script>
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const tabs = document.querySelectorAll(".tab");

function showLogin(){
  loginForm.classList.remove("hidden");
  signupForm.classList.add("hidden");
  tabs[0].classList.add("active");
  tabs[1].classList.remove("active");
}

function showSignup(){
  signupForm.classList.remove("hidden");
  loginForm.classList.add("hidden");
  tabs[1].classList.add("active");
  tabs[0].classList.remove("active");
}

loginForm.addEventListener("submit", e=>{
  e.preventDefault();
  alert("Login system connects in backend phase.");
});

signupForm.addEventListener("submit", e=>{
  e.preventDefault();
  alert("Account creation connects in backend phase.");
});
</script>

</body>
</html>
