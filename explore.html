<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Explore Talent — SkillBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#6366f1;
  --accent2:#22d3ee;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:var(--text);}

header{
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #334155;
}

.logo{
  font-weight:700;
  font-size:22px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.container{padding:50px 8%;}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:35px;
}

.search{
  flex:1;
  min-width:250px;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select{
  padding:10px;
  border-radius:20px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  border:1px solid #334155;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
  box-shadow:0 10px 35px rgba(0,0,0,0.4);
}

.avatar{
  width:60px;
  height:60px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  margin-bottom:12px;
}

.card h3{margin-bottom:6px;}
.card p{font-size:14px;color:var(--muted);margin-bottom:10px;}

.meta{
  font-size:13px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}

footer{
  margin-top:80px;
  padding:30px;
  text-align:center;
  color:var(--muted);
  border-top:1px solid #334155;
}
</style>
</head>

<body>

<header>
  <div class="logo">SkillBridge</div>
  <div>Browse Talent</div>
</header>

<div class="container">

  <div class="top-bar">
    <div class="search">
      <input type="text" id="searchInput" placeholder="Search skills or roles...">
    </div>
    <div class="filters">
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="dev">Development</option>
        <option value="design">Design</option>
        <option value="writing">Writing</option>
      </select>
      <select>
        <option>Any Budget</option>
        <option>$50–200</option>
        <option>$200–500</option>
        <option>$500+</option>
      </select>
    </div>
  </div>

  <div class="grid" id="talentGrid">

    <div class="card" data-category="dev" data-name="Jordan Dev">
      <div class="avatar">JD</div>
      <h3>Jordan Dev</h3>
      <p>Full-stack web apps & SaaS platforms</p>
      <div class="meta"><span>⭐ 4.9</span><span>From $350</span></div>
    </div>

    <div class="card" data-category="design" data-name="Lena Design">
      <div class="avatar">LD</div>
      <h3>Lena Design</h3>
      <p>UI/UX & product interface design</p>
      <div class="meta"><span>⭐ 4.8</span><span>From $220</span></div>
    </div>

    <div class="card" data-category="writing" data-name="Chris Writer">
      <div class="avatar">CW</div>
      <h3>Chris Writer</h3>
      <p>SEO articles & conversion copy</p>
      <div class="meta"><span>⭐ 4.7</span><span>From $120</span></div>
    </div>

  </div>

</div>

<footer>
  © 2026 SkillBridge — Verified Talent Marketplace
</footer>

<script>
const searchInput = document.getElementById("searchInput");
const categoryFilter = document.getElementById("categoryFilter");
const cards = document.querySelectorAll(".card");

function filterCards(){
  const search = searchInput.value.toLowerCase();
  const category = categoryFilter.value;

  cards.forEach(card=>{
    const name = card.dataset.name.toLowerCase();
    const cat = card.dataset.category;

    const matchSearch = name.includes(search);
    const matchCat = category === "all" || category === cat;

    card.style.display = (matchSearch && matchCat) ? "block" : "none";
  });
}

searchInput.addEventListener("input", filterCards);
categoryFilter.addEventListener("change", filterCards);

cards.forEach(card=>{
  card.addEventListener("click",()=>window.location.href="seller.html");
});
</script>

</body>
</html>
