<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Messages — SkillBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --panel:#1e293b;
  --accent:#6366f1;
  --accent2:#22d3ee;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:18px 6%;
  border-bottom:1px solid #334155;
  display:flex;
  justify-content:space-between;
}

.logo{
  font-weight:700;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* Sidebar */
.sidebar{
  width:280px;
  background:var(--panel);
  border-right:1px solid #334155;
  padding:20px;
  overflow-y:auto;
}

.thread{
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  transition:0.2s;
  border:1px solid transparent;
}

.thread:hover{
  background:#0f172a;
  border-color:var(--accent);
}

.thread h4{font-size:14px;margin-bottom:4px;}
.thread p{font-size:12px;color:var(--muted);}

/* Chat area */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:25px;
  overflow-y:auto;
}

.bubble{
  max-width:60%;
  padding:12px 16px;
  margin-bottom:12px;
  border-radius:15px;
  font-size:14px;
  line-height:1.4;
}

.me{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  align-self:flex-end;
}

.them{
  background:var(--panel);
  border:1px solid #334155;
}

.input-area{
  padding:18px;
  border-top:1px solid #334155;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:var(--accent2);
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">SkillBridge</div>
  <div>Project Messages</div>
</header>

<div class="main">

  <div class="sidebar">
    <div class="thread">
      <h4>Landing Page Project</h4>
      <p>Jordan Dev</p>
    </div>
    <div class="thread">
      <h4>SEO Blog Articles</h4>
      <p>Chris Writer</p>
    </div>
  </div>

  <div class="chat">
    <div class="messages" id="messages">

      <div class="bubble them">Hi! I reviewed your project brief and can start immediately.</div>
      <div class="bubble me">Great. Can you include mobile optimization?</div>
      <div class="bubble them">Absolutely. That’s already part of my workflow.</div>

    </div>

    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>
function sendMessage(){
  const input = document.getElementById("msgInput");
  if(input.value.trim()==="") return;

  const msg = document.createElement("div");
  msg.className="bubble me";
  msg.textContent=input.value;

  document.getElementById("messages").appendChild(msg);
  input.value="";
  document.getElementById("messages").scrollTop=9999;
}
</script>

</body>
</html>
